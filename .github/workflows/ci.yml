name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-typecheck-test:
    name: build, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # packages/render and packages/draft spawn a real ffmpeg/ffprobe binary in their test
      # suites (synthetic testsrc clips, no mocking) - GitHub's ubuntu-latest runner image does
      # not ship ffmpeg preinstalled, so it must be installed explicitly or those tests fail.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test check scripts
        run: pnpm test:checks

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      # check-schema-examples imports packages/schema/dist, so this must run after Build.
      - name: Check repo conventions
        run: pnpm check:repo
